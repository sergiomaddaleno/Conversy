<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="google-site-verification" content="VSyieJN-70pmN_mheKWoLhkMSptG5csUPzCUyFpVWkM" />

  <title>Conversy - Converter online</title>
  <meta name="description" content="Convert images, PDFs and files online for free. JPG, PNG, PDF and more.">

  <link rel="icon" type="image/png" href="./assets/converticon.png">
  <link rel="stylesheet" href="assets/style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  </script>

  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1721364558213403"
    crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  
</head>

<body>
  <div class="lang-switch">
    <button data-lang="es">ES</button>
    <button data-lang="en">EN</button>
    <button data-lang="fr">FR</button>
  </div>

  <div class="container">
    <h1>Conversy</h1>
    <p id="subtitle"></p>
    <p id="activeTool" class="active-tool"></p>
    <div class="menu" id="menu"></div>
    <div id="app"></div>

    <div class="ad-container">
      <ins class="adsbygoogle"
        style="display:block"
        data-ad-client="ca-pub-1721364558213403"
        data-ad-slot="9267995861"
        data-ad-format="auto"
        data-full-width-responsive="true"></ins>
    </div>
  </div>

  <div id="cookieBanner" class="cookie-banner">
    <div class="cookie-content">
      <p>This website uses cookies for analytics and ads.</p>
      <button id="acceptCookies">Accept</button>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <p>© 2026 Conversy · Simple online tools</p>
      <span class="footer-version">v1.0.0</span>
    </div>
  </footer>

  <script type="module" src="src/main.js"></script>

  <script>
    function showAd() {
      try {
        (window.adsbygoogle = window.adsbygoogle || []).push({});
      } catch (e) {
        console.log(e);
      }
    }

    function initAds() {
      if (window.adsInitialized) return;
      window.adsInitialized = true;
      showAd();
    }

    window.addEventListener('DOMContentLoaded', () => {
      const banner = document.getElementById('cookieBanner');
      const acceptBtn = document.getElementById('acceptCookies');

      if (localStorage.getItem('cookiesAccepted') === 'true') {
        banner.style.display = 'none';
        initAds();
      }

      if (!acceptBtn) return;

      acceptBtn.addEventListener('click', () => {
        localStorage.setItem('cookiesAccepted', 'true');
        banner.style.display = 'none';
        initAds();
      });
    });
  </script>
</body>
</html>
